name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: DeterminateSystems/determinate-nix-action@629b284231c2a82554b724e357e47fc6020833c8 # v3

      - name: nix flake check
        run: |
          set -euo pipefail
          system="$(nix eval --raw --impure --expr builtins.currentSystem)"
          nix flake check --no-build --print-build-logs
          nix build --print-build-logs \
            ".#checks.$system.module-render" \
            ".#checks.$system.config-opt-in" \
            ".#checks.$system.config-default-off" \
            ".#checks.$system.package-default-off" \
            ".#checks.$system.rtk-file-off" \
            ".#checks.$system.agents-file-off" \
            ".#checks.$system.package-opt-in" \
            ".#checks.$system.self-package-module" \
            ".#checks.$system.generated-rtk" \
            ".#checks.$system.lint"

  # Required, not advisory: the package is a prebuilt-binary fetch (seconds),
  # and auto-merged bump PRs must prove it installs and reports the right
  # version before they can land.
  package-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: DeterminateSystems/determinate-nix-action@629b284231c2a82554b724e357e47fc6020833c8 # v3

      - name: Build and smoke-test the Codex package
        run: |
          set -euo pipefail
          system="$(nix eval --raw --impure --expr builtins.currentSystem)"
          nix build --print-build-logs ".#checks.$system.codex-version"

  flakehub-publish:
    runs-on: ubuntu-latest
    needs: [check, package-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: DeterminateSystems/determinate-nix-action@629b284231c2a82554b724e357e47fc6020833c8 # v3

      - uses: DeterminateSystems/flakehub-push@0e801cf490b3b3dcb099131a69146bc59d610d0f # main, pinned 2026-06-30
        with:
          name: ErikBPF/codex-flake
          rolling: true
          # Keep this release lane above any accidental stale 0.1.* publish.
          rolling-minor: 2
          visibility: public

  flakehub-verify:
    runs-on: ubuntu-latest
    needs: flakehub-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: DeterminateSystems/determinate-nix-action@629b284231c2a82554b724e357e47fc6020833c8 # v3

      - name: FlakeHub wildcard resolves to this commit
        run: |
          set -euo pipefail
          metadata="$(nix flake metadata --refresh 'https://flakehub.com/f/ErikBPF/codex-flake/*' --json)"
          revision="$(printf '%s\n' "$metadata" | python3 -c 'import json,sys; print(json.load(sys.stdin)["revision"])')"
          if [ "$revision" != "$GITHUB_SHA" ]; then
            printf 'FlakeHub wildcard resolved %s, expected %s\n' "$revision" "$GITHUB_SHA" >&2
            exit 1
          fi
