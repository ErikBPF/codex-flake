name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/determinate-nix-action@v3

      - name: nix flake check
        run: nix flake check --print-build-logs

  flakehub-publish:
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/determinate-nix-action@v3

      - uses: DeterminateSystems/flakehub-push@main
        with:
          name: ErikBPF/codex-flake
          rolling: true
          # Keep this release lane above any accidental stale 0.1.* publish.
          rolling-minor: 2
          visibility: public

  flakehub-verify:
    runs-on: ubuntu-latest
    needs: flakehub-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: DeterminateSystems/determinate-nix-action@v3

      - name: FlakeHub wildcard resolves to this commit
        run: |
          set -euo pipefail
          metadata="$(nix flake metadata --refresh 'https://flakehub.com/f/ErikBPF/codex-flake/*' --json)"
          revision="$(printf '%s\n' "$metadata" | python3 -c 'import json,sys; print(json.load(sys.stdin)["revision"])')"
          if [ "$revision" != "$GITHUB_SHA" ]; then
            printf 'FlakeHub wildcard resolved %s, expected %s\n' "$revision" "$GITHUB_SHA" >&2
            exit 1
          fi
