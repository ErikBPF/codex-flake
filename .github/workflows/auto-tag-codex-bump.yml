name: Auto-tag Codex package bumps

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Extract packaged Codex version and push tag
        run: |
          set -euo pipefail
          version=$(sed -n 's/^  version = "\([^"]*\)";/\1/p' packages/codex/package.nix | head -1)
          if ! printf '%s\n' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "current Codex package version is malformed: $version" >&2
            exit 0
          fi
          tag="codex-v$version"
          if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
            echo "tag $tag already exists; skipping" >&2
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -a "$tag" -m "codex $version"
          git push origin "refs/tags/$tag"
